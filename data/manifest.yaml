# Public-data manifest -- P4 HNSCC-TIME multimodal pipeline.
#
# This file is the committed CHECKSUM LEDGER for the demo's public inputs. Every
# genomics input below is NIH GDC open tier (no controlled-access auth) and is
# pinned by sha256 so a fetch can be byte-verified.
#
# Two arms:
#   - genomics (TCGA-HNSC): 50 RNA-Seq STAR-Counts (plain TSV) + a clinical
#     /cases query, for a DETERMINISTIC n=50 subset (all open STAR-Counts file_ids
#     sorted, then seed=42 shuffle, then first 50; see scripts/download_tcga_hnsc.sh).
#   - IHC (TCIA): the HNSCC-mIF-mIHC-comparison collection (8 patients). Resolved
#     below; image checksums are not pinned here (multi-GB, Aspera-only) -- see ihc:.
#
# NOTE on `make data`: the genomics arm is prepared by scripts/download_tcga_hnsc.sh,
# which writes data/tcga_hnsc/_subset_manifest.tsv + star_counts/<case>__<file>.tsv +
# clinical.tsv (the layout cohort.load_cohort reads). `pipeline fetch` downloads the
# STAR `inputs` below by URL to the same paths and verifies sha256, but does not yet
# build the subset index or fetch the clinical block -- wiring fetch end-to-end is a
# tracked follow-up (see ROADMAP). Until then this manifest's role is the verifiable
# ledger, and the download script is the data path.
#
# Adding an input requires editing this file AND the README's claim. That friction
# is intentional (see docs/what-is-out-of-scope.md).

# ----- clinical (GDC /cases POST; canonical TSV = header + sorted rows) --------
clinical:
  endpoint: https://api.gdc.cancer.gov/cases
  method: POST
  project: TCGA-HNSC
  subset: "the n=50 cases of the pinned STAR inputs below (filter: submitter_id in <those cases>)"
  format: "TSV, canonicalized as header + rows sorted lexicographically (byte-stable)"
  fields:
    - submitter_id
    - demographic.gender
    - demographic.race
    - demographic.year_of_birth
    - demographic.vital_status
    - diagnoses.primary_diagnosis
    - diagnoses.tissue_or_organ_of_origin
    - diagnoses.days_to_last_follow_up
    - diagnoses.days_to_death
    - exposures.tobacco_smoking_status
  path: tcga_hnsc/clinical.tsv
  sha256: cebcec759f1696dc2204de7e1c39dccd6ee92c248fc59692509c032741ebcfa3
  license: NIH GDC Data Use Agreement (open tier)
  source: "Clinical metadata (gender, race, vital status, diagnosis, subsite, survival, smoking) for the n=50 TCGA-HNSC cases in the genomics subset."

# ----- HPV± overall survival (Arm 4; GDC molecular tests) ---------------------
# Independent of the n=50 genomics subset: this covers every TCGA-HNSC case with
# a molecular HPV test result + usable overall survival (n=110). Fetched into
# tcga_hnsc/hpv_status.tsv (submitter_id, hpv_status, os_days, os_event), sorted,
# sha256-pinned.
hpv:
  endpoint: https://api.gdc.cancer.gov/cases
  project: TCGA-HNSC
  laboratory_test: human papillomavirus
  path: tcga_hnsc/hpv_status.tsv
  sha256: 76485138ae2fac5df57fff5e712d090a3153b0de3e532a072ea6a4d20736141f
  n_cases: 110
  mapping: "test_result Positive/Amplified -> positive; Negative/Not Amplified -> negative; known HPV + usable OS only"
  license: NIH GDC Data Use Agreement (open tier)
  source: "TCGA-HNSC molecular HPV test (follow_ups.molecular_tests) joined to overall survival; n=110 (42 HPV+, 68 HPV-)."

# ----- IHC ground truth (TCIA, RESOLVED + CHECKSUMMED 2026-06-07) --------------
# Earlier notes guessed a Zenodo record; the canonical home is The Cancer Imaging
# Archive. The TCIA web download is faspex/Aspera, but every ROI image is also
# directly HTTPS-fetchable from the TCIA pathology host (pathdb), so all 3212 ROIs
# are now pinned by sha256 in data/pmc10571229/rois_manifest.tsv (rel_path + sha256
# + direct URL). That ledger file's own sha256 is pinned here, and it is verified
# byte-stable on re-download.
ihc:
  collection: HNSCC-mIF-mIHC-comparison (TCIA, Version 2, 2023-08-31)
  doi: 10.7937/TCIA.2020.T90F-WB82
  url: https://www.cancerimagingarchive.net/collection/hnscc-mif-mihc-comparison/
  patients: 8
  rois: 3212
  size_gb: 1.01
  format: PNG
  license: CC-BY-4.0
  download: "direct pathdb HTTPS per file (no Aspera); see scripts/download_pmc10571229.sh"
  checksums_file: pmc10571229/rois_manifest.tsv
  checksums_file_sha256: 08c912596a677eb04512c17a2671cb218db46688b6097aa46ae6377870631a5d
  source: "Ghahremani et al. 2023, MICCAI (PMC10571229). 8 HNSCC patients; 9 ROIs/slide (3 tumor-core T, 3 margin M, 3 stroma S), each subdivided into 512x512 patches; file notation Case[id]_[T/M/S][1-3]_[ROI_index]_[marker]."

